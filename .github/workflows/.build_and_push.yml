name: CI/CD Pipeline for MontyCat

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  release:
    types: [published]
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Run deployment script (dry run)
        run: |
          chmod +x ./build_and_push.sh
          ./build_and_push.sh
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          CI_DEPLOY: false  # Dry run, no upload

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Run deployment script (deploy)
        run: |
          chmod +x ./build_and_push.sh
          ./build_and_push.sh
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          CI_DEPLOY: true